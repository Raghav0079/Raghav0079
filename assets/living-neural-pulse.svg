<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 30" width="100%" preserveAspectRatio="none">
<defs>
  <linearGradient id="neonFlow" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#00D4C8"/>
    <stop offset="20%"  stop-color="#a78bfa"/>
    <stop offset="40%"  stop-color="#00D4C8"/>
    <stop offset="60%"  stop-color="#c4b5fd"/>
    <stop offset="80%"  stop-color="#00D4C8"/>
    <stop offset="100%" stop-color="#a78bfa"/>
  </linearGradient>
  <filter id="neonGlow">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="wideGlow">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>
<style>
  @keyframes flowParticle {
    0%   { transform: translateX(-60px); opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { transform: translateX(1260px); opacity: 0; }
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 1;   }
  }
  @keyframes shimmer {
    0%, 100% { opacity: 0.15; }
    50%      { opacity: 0.4;  }
  }
</style>
<rect x="0" y="7.0" width="1200" height="16" fill="url(#neonFlow)" rx="8" style="animation: shimmer 5s ease-in-out infinite; opacity: 0.15;" filter="url(#wideGlow)"/>
<line x1="0" y1="15.0" x2="1200" y2="15.0" stroke="url(#neonFlow)" stroke-width="1.5" filter="url(#neonGlow)" style="animation: breathe 3s ease-in-out infinite;"/>
<circle cx="0" cy="15.0" r="1.0" fill="#00D4C8" filter="url(#neonGlow)" style="animation: flowParticle 4.0s linear infinite 0.00s;"/>
<circle cx="0" cy="18.0" r="1.5" fill="#a78bfa" filter="url(#neonGlow)" style="animation: flowParticle 4.8s linear infinite 0.40s;"/>
<circle cx="0" cy="19.0" r="2.0" fill="#c4b5fd" filter="url(#neonGlow)" style="animation: flowParticle 5.6s linear infinite 0.80s;"/>
<circle cx="0" cy="17.2" r="1.0" fill="#7c3aed" filter="url(#neonGlow)" style="animation: flowParticle 6.4s linear infinite 1.20s;"/>
<circle cx="0" cy="14.0" r="1.5" fill="#00D4C8" filter="url(#neonGlow)" style="animation: flowParticle 4.0s linear infinite 1.60s;"/>
<circle cx="0" cy="11.4" r="2.0" fill="#a78bfa" filter="url(#neonGlow)" style="animation: flowParticle 4.8s linear infinite 2.00s;"/>
<circle cx="0" cy="11.3" r="1.0" fill="#c4b5fd" filter="url(#neonGlow)" style="animation: flowParticle 5.6s linear infinite 2.40s;"/>
<circle cx="0" cy="13.7" r="1.5" fill="#7c3aed" filter="url(#neonGlow)" style="animation: flowParticle 6.4s linear infinite 2.80s;"/>
<circle cx="0" cy="17.0" r="2.0" fill="#00D4C8" filter="url(#neonGlow)" style="animation: flowParticle 4.0s linear infinite 3.20s;"/>
<circle cx="0" cy="18.9" r="1.0" fill="#a78bfa" filter="url(#neonGlow)" style="animation: flowParticle 4.8s linear infinite 3.60s;"/>
<circle cx="0" cy="18.2" r="1.5" fill="#c4b5fd" filter="url(#neonGlow)" style="animation: flowParticle 5.6s linear infinite 4.00s;"/>
<circle cx="0" cy="15.3" r="2.0" fill="#7c3aed" filter="url(#neonGlow)" style="animation: flowParticle 6.4s linear infinite 4.40s;"/>
<circle cx="0" cy="12.2" r="1.0" fill="#00D4C8" filter="url(#neonGlow)" style="animation: flowParticle 4.0s linear infinite 4.80s;"/>
<circle cx="0" cy="11.0" r="1.5" fill="#a78bfa" filter="url(#neonGlow)" style="animation: flowParticle 4.8s linear infinite 5.20s;"/>
<circle cx="0" cy="12.5" r="2.0" fill="#c4b5fd" filter="url(#neonGlow)" style="animation: flowParticle 5.6s linear infinite 5.60s;"/>
<circle cx="0" cy="15.7" r="1.0" fill="#7c3aed" filter="url(#neonGlow)" style="animation: flowParticle 6.4s linear infinite 6.00s;"/>
<circle cx="0" cy="18.4" r="1.5" fill="#00D4C8" filter="url(#neonGlow)" style="animation: flowParticle 4.0s linear infinite 6.40s;"/>
<circle cx="0" cy="18.8" r="2.0" fill="#a78bfa" filter="url(#neonGlow)" style="animation: flowParticle 4.8s linear infinite 6.80s;"/>
<circle cx="0" cy="16.6" r="1.0" fill="#c4b5fd" filter="url(#neonGlow)" style="animation: flowParticle 5.6s linear infinite 7.20s;"/>
<circle cx="0" cy="13.3" r="1.5" fill="#7c3aed" filter="url(#neonGlow)" style="animation: flowParticle 6.4s linear infinite 7.60s;"/>
<circle cx="50" cy="15.0" fill="#00D4C8" filter="url(#neonGlow)" opacity="0.4">
  <animate attributeName="r"       values="1;3.5;1" dur="2.0s" begin="0.0s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.3;1;0.3" dur="2.0s" begin="0.0s" repeatCount="indefinite"/>
</circle>
