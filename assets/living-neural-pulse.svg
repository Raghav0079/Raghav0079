  <animate attributeName="r"       values="1;3.5;1" dur="3.2s" begin="3.0s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" begin="3.0s" repeatCount="indefinite"/>
</circle>
<circle cx="1062" cy="15.0" fill="#7c3aed" filter="url(#neonGlow)" opacity="0.4">
  <animate attributeName="r"       values="1;3.5;1" dur="3.8s" begin="3.3s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.3;1;0.3" dur="3.8s" begin="3.3s" repeatCount="indefinite"/>
