<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#020510;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#050d1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>

    <!-- Teal glow filter -->
    <filter id="tealGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Purple glow for subtitle -->
    <filter id="purpleGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Badge glow -->
    <filter id="badgeGlow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Wave clip -->
    <clipPath id="waveClip">
      <rect width="800" height="280"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bgGrad)"/>

  <!-- Scattered dots / stars -->
  <g opacity="0.6">
    <circle cx="42"  cy="22"  r="1.2" fill="#7ee8fa"/>
    <circle cx="180" cy="55"  r="0.8" fill="#a78bfa"/>
    <circle cx="310" cy="18"  r="1"   fill="#7ee8fa"/>
    <circle cx="520" cy="40"  r="1.4" fill="#c4b5fd"/>
    <circle cx="680" cy="15"  r="0.9" fill="#7ee8fa"/>
    <circle cx="740" cy="60"  r="1.1" fill="#a78bfa"/>
    <circle cx="760" cy="120" r="0.7" fill="#7ee8fa"/>
    <circle cx="60"  cy="150" r="1"   fill="#c4b5fd"/>
    <circle cx="110" cy="210" r="0.8" fill="#7ee8fa"/>
    <circle cx="700" cy="200" r="1.2" fill="#a78bfa"/>
    <circle cx="400" cy="8"   r="0.9" fill="#7ee8fa"/>
    <circle cx="600" cy="165" r="0.7" fill="#c4b5fd"/>
    <circle cx="250" cy="240" r="1"   fill="#7ee8fa"/>
    <circle cx="150" cy="130" r="0.6" fill="#a78bfa"/>
    <circle cx="640" cy="90"  r="1"   fill="#7ee8fa"/>
  </g>

  <!-- Subtle horizontal line accents -->
  <line x1="0" y1="195" x2="800" y2="195" stroke="#0e3a5c" stroke-width="0.5" opacity="0.4"/>

  <!-- ── MAIN TITLE: RAGHAV MISHRA ── -->
  <!-- Shadow / glow layer -->
  <text x="400" y="92" text-anchor="middle"
        font-family="'Courier New', 'Lucida Console', monospace"
        font-size="58" font-weight="900" letter-spacing="10"
        fill="#0ff5e4" opacity="0.18" filter="url(#tealGlow)">RAGHAV MISHRA</text>

  <!-- Main white letters, with teal accent on selective chars -->
  <text x="400" y="92" text-anchor="middle"
        font-family="'Courier New', 'Lucida Console', monospace"
        font-size="58" font-weight="900" letter-spacing="10" fill="#e8f4f8">
    R<tspan fill="#00d4c8">A</tspan>GHAV MI<tspan fill="#00d4c8">S</tspan>HRA
  </text>

  <!-- Glitch duplicate (slightly offset, low opacity) -->
  <text x="402" y="90" text-anchor="middle"
        font-family="'Courier New', 'Lucida Console', monospace"
        font-size="58" font-weight="900" letter-spacing="10"
        fill="#00d4c8" opacity="0.08">RAGHAV MISHRA</text>

  <!-- ── SUBTITLE: AI / ML ENGINEER ── -->
  <text x="400" y="125" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="12.5" font-weight="400" letter-spacing="7"
        fill="#8bafc8" opacity="0.9">A I   /   M L   E N G I N E E R   —   R E S E A R C H E R   —   B U I L D E R</text>

  <!-- ── ROLE LINE (italic, dot-separated) ── -->
  <text x="400" y="151" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="11.5" letter-spacing="1"
        fill="#6d8fa8" opacity="0.85">
    LLM Orchestration · Agentic AI · Data Engineering · Edge ML
  </text>

  <!-- ── BADGE / PILL ── -->
  <!-- Pill background -->
  <rect x="218" y="167" width="364" height="26" rx="13" ry="13"
        fill="none" stroke="#1e6a6a" stroke-width="1" opacity="0.9"/>
  <rect x="219" y="168" width="362" height="24" rx="12" ry="12"
        fill="#071e26" opacity="0.9"/>

  <!-- Badge star glyphs and text -->
  <text x="400" y="184" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="11" letter-spacing="3" fill="#00d4c8">
    ✦  B.TECH (HONS.) AI  ·  SAGE UNIVERSITY, INDORE  ✦
  </text>

  <!-- ── ANIMATED WAVE ── -->
  <g clip-path="url(#waveClip)">
    <!-- Wave 1 - primary teal -->
    <path fill="none" stroke="#0a5c6b" stroke-width="1.5" opacity="0.7">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="
          M0,225 C100,215 200,235 300,225 C400,215 500,235 600,225 C700,215 800,230 800,225 L800,280 L0,280 Z;
          M0,228 C100,220 200,232 300,222 C400,212 500,232 600,222 C700,215 800,225 800,220 L800,280 L0,280 Z;
          M0,225 C100,215 200,235 300,225 C400,215 500,235 600,225 C700,215 800,230 800,225 L800,280 L0,280 Z
        "/>
    </path>

    <!-- Wave 2 - deeper, purple tint -->
    <path fill="#0a1628" stroke="#12344d" stroke-width="1" opacity="0.6">
      <animate attributeName="d" dur="8s" repeatCount="indefinite"
        values="
          M0,238 C133,228 266,248 400,238 C534,228 667,248 800,238 L800,280 L0,280 Z;
          M0,242 C133,234 266,244 400,234 C534,224 667,244 800,234 L800,280 L0,280 Z;
          M0,238 C133,228 266,248 400,238 C534,228 667,248 800,238 L800,280 L0,280 Z
        "/>
    </path>

    <!-- Wave 3 - solid dark fill to ground the waves -->
    <path fill="#071018" opacity="0.95">
      <animate attributeName="d" dur="10s" repeatCount="indefinite"
        values="
          M0,252 C200,244 400,260 600,250 C700,245 800,255 800,252 L800,280 L0,280 Z;
          M0,255 C200,248 400,256 600,248 C700,243 800,252 800,250 L800,280 L0,280 Z;
          M0,252 C200,244 400,260 600,250 C700,245 800,255 800,252 L800,280 L0,280 Z
        "/>
    </path>
  </g>

  <!-- Subtle teal glow line above wave -->
  <line x1="0" y1="224" x2="800" y2="224" stroke="#00d4c8" stroke-width="0.6" opacity="0.25"/>

  <!-- Corner accent dots -->
  <circle cx="20" cy="20" r="2.5" fill="#00d4c8" opacity="0.4"/>
  <circle cx="780" cy="20" r="2.5" fill="#00d4c8" opacity="0.4"/>
  <circle cx="20" cy="260" r="2.5" fill="#00d4c8" opacity="0.25"/>
  <circle cx="780" cy="260" r="2.5" fill="#00d4c8" opacity="0.25"/>

  <!-- Top border glow line -->
  <line x1="0" y1="0" x2="800" y2="0" stroke="#00d4c8" stroke-width="1.5" opacity="0.3"/>
</svg>
